# AlwaysDropPlus Configuration File
# Minecraft Forge 1.12.2
# Last updated: 2024

# ==========================================
# GENERAL SETTINGS
# ==========================================

# Enable maximum item drops from mobs
# If true, mobs will drop the maximum quantity of items from their loot tables
# Default: true
enableMaxDrops=true

# Enable Looting enchantment scaling
# If true, Looting enchantment will further increase dropped item quantities
# Each level of Looting provides additional drops based on lootingMultiplier
# Default: true
enableLootingScaling=true

# Enable guaranteed experience drops
# If true, all mobs will always drop experience orbs when killed
# Overrides vanilla conditions that might prevent XP drops
# Default: true
enableAlwaysXp=true

# Enable debug logging
# If true, detailed debug messages will be logged to the console
# Useful for troubleshooting and understanding what the mod is doing
# Default: false
enableDebug=false

# ==========================================
# SCALING SETTINGS
# ==========================================

# Looting enchantment multiplier
# Base multiplier applied per Looting level
# Example: With value 1.0 and Looting III, drops are multiplied by (1 + 3*1.0) = 4x
# Range: 0.5 to 5.0
# Default: 1.0
lootingMultiplier=1.0

# Experience drop multiplier
# Multiplier applied to all XP drops
# Example: With value 2.0, mobs drop 2x their normal experience
# Range: 0.1 to 10.0
# Default: 1.0
xpMultiplier=1.0

# ==========================================
# BLACKLIST SETTINGS
# ==========================================

# Entity types to exclude from AlwaysDropPlus mechanics
# Format: modid:entityname or just entity class name
# Separate multiple entries with commas
# Example: minecraft:player,minecraft:armor_stand,modname:custom_entity
# Default: (empty - no entities excluded)
entityBlacklist=
